<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fake News Detector</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>Fake News Detector</h1>

        <textarea id="newsInput" placeholder="Paste news text here to check its authenticity..."></textarea>

        <button onclick="checkNews()">Check News</button>

        <div id="result"></div>

        <div class="info">
            This tool checks 30,000+ news sources via NewsAPI to verify authenticity.
        </div>

        <div class="examples">
            <h3>Example Inputs:</h3>
            <ul>
                <li>"India wins ODI World Cup 2023"</li>
                <li>"Breaking: Alien spaceship spotted over Delhi!"</li>
                <li>"Drinking lemon juice cures cancer in 3 days!"</li>
            </ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
