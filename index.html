<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fake News Detector</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>Fake News Detector</h1>

        <textarea id="newsInput" placeholder="Paste news text here to check its authenticity..."></textarea>

        <!-- <button onclick="checkNews()">Check News</button> -->
        <button id="checkButton">Check News</button>

        <div id="result-container">
            <div id="result-text" class="result-text"></div>
            <div class="percentage-container">
                <div class="percentage-item">
                    <div class="percentage-circle">
                        <svg viewBox="0 0 36 36">
                            <path class="circle-bg" d="M18 2.0845
                                a 15.9155 15.9155 0 0 1 0 31.831
                                a 15.9155 15.9155 0 0 1 0 -31.831" />
                            <path id="real-circle" class="circle-fill real-circle" stroke-dasharray="0, 100" d="M18 2.0845
                                a 15.9155 15.9155 0 0 1 0 31.831
                                a 15.9155 15.9155 0 0 1 0 -31.831" />
                        </svg>
                        <div id="real-percent" class="percentage-text">0%</div>
                    </div>
                    <div class="percentage-label">REAL</div>
                </div>
                <div class="percentage-item">
                    <div class="percentage-circle">
                        <svg viewBox="0 0 36 36">
                            <path class="circle-bg" d="M18 2.0845
                                a 15.9155 15.9155 0 0 1 0 31.831
                                a 15.9155 15.9155 0 0 1 0 -31.831" />
                            <path id="fake-circle" class="circle-fill fake-circle" stroke-dasharray="0, 100" d="M18 2.0845
                                a 15.9155 15.9155 0 0 1 0 31.831
                                a 15.9155 15.9155 0 0 1 0 -31.831" />
                        </svg>
                        <div id="fake-percent" class="percentage-text">0%</div>
                    </div>
                    <div class="percentage-label">FAKE</div>
                </div>
            </div>
            <div id="news-details" class="news-details"></div>
        </div>

        <div class="info">
            This tool checks 30,000+ news sources via NewsAPI to verify authenticity.
        </div>

        <div class="examples">
            <h3>Example Inputs:</h3>
            <ul>
                <li>Pakistan wins by 5 wickets against India in T20 World Cup</li>
                <li>Breaking: Alien spaceship spotted over Delhi!</li>
                <li>Drinking lemon juice cures cancer in 3 days!</li>
            </ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
